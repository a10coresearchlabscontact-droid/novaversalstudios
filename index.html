<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaVersal Studios</title>

<style>

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

#bg-video{
    position:fixed;
    top:0;
    left:0;

    width:100vw;
    height:100vh;

    object-fit:cover;
    background:black;
}

#enterButton{

    position:fixed;
    bottom:40px;
    left:50%;

    transform:translateX(-50%);

    padding:14px 28px;

    border:none;
    border-radius:40px;

    background:rgba(0,0,0,.65);

    color:white;

    font-size:16px;
    font-family:Arial, Helvetica, sans-serif;
    letter-spacing:1px;

    cursor:pointer;

    backdrop-filter:blur(10px);

    z-index:999;
}

#enterButton:hover{
    background:rgba(0,0,0,.85);
}

@media (max-width:768px){

    #bg-video{
        object-fit:contain;
    }

    #enterButton{
        bottom:25px;
        font-size:14px;
        padding:12px 22px;
    }

}

</style>

</head>

<body>

<video
    id="bg-video"
    autoplay
    muted
    loop
    playsinline
>
    <source src="genesis-ident.mp4" type="video/mp4">
</video>

<button id="enterButton">
🔊 ENTER WITH SOUND
</button>

<script>

const video = document.getElementById("bg-video");
const button = document.getElementById("enterButton");

button.addEventListener("click", () => {

    video.muted = false;

    video.play();

    button.style.display = "none";

});

</script>

</body>
</html>
