<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaVersal Studios</title>

<style>

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

#bg-video{
    position:fixed;
    top:0;
    left:0;

    width:100vw;
    height:100vh;

    object-fit:cover;
    object-position:center center;

    background:black;

    z-index:1;
}

#overlay{
    position:fixed;
    inset:0;

    background:linear-gradient(
        to bottom,
        rgba(0,0,0,.15),
        rgba(0,0,0,.25)
    );

    z-index:2;

    pointer-events:none;
}

#enterButton{

    position:fixed;

    left:50%;
    bottom:40px;

    transform:translateX(-50%);

    padding:16px 32px;

    border:1px solid rgba(255,255,255,.25);

    border-radius:50px;

    background:rgba(0,0,0,.45);

    color:white;

    font-family:Arial, Helvetica, sans-serif;
    font-size:16px;
    letter-spacing:2px;

    cursor:pointer;

    backdrop-filter:blur(12px);

    z-index:999;

    transition:all .3s ease;

    box-shadow:
        0 0 15px rgba(0,140,255,.35),
        0 0 40px rgba(0,140,255,.15);
}

#enterButton:hover{

    transform:translateX(-50%) scale(1.05);

    box-shadow:
        0 0 25px rgba(0,140,255,.55),
        0 0 60px rgba(0,140,255,.25);
}

@media (max-width:768px){

    #bg-video{
        object-fit:cover;
        object-position:center center;
    }

    #enterButton{
        bottom:28px;
        font-size:14px;
        padding:14px 24px;
    }

}

</style>

</head>

<body>

<video
    id="bg-video"
    autoplay
    muted
    loop
    playsinline
>
    <source src="MOVIL%20720.mov" type="video/quicktime">
</video>

<div id="overlay"></div>

<button id="enterButton">
🔊 ENTER WITH SOUND
</button>

<script>

const video = document.getElementById("bg-video");
const button = document.getElementById("enterButton");

button.addEventListener("click", () => {

    video.muted = false;

    video.play();

    button.style.display = "none";

});

</script>

</body>
</html>
