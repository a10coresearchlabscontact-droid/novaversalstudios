<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaVersal Studios</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Arial, Helvetica, sans-serif;
}

video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
background:#000;
}

#soundButton{
position:fixed;
bottom:30px;
right:30px;
z-index:999;
background:rgba(0,0,0,0.65);
color:white;
border:1px solid rgba(255,255,255,0.3);
padding:12px 20px;
border-radius:30px;
cursor:pointer;
font-size:14px;
letter-spacing:1px;
backdrop-filter:blur(10px);
transition:all .3s ease;
}

#soundButton:hover{
transform:scale(1.05);
background:rgba(20,20,20,0.85);
}

</style>

</head>

<body>

<video id="introVideo" autoplay muted loop playsinline>
<source src="genesis-ident.mp4" type="video/mp4">
</video>

<button id="soundButton">
🔊 ENTER WITH SOUND
</button>

<script>

const video = document.getElementById("introVideo");
const button = document.getElementById("soundButton");

button.addEventListener("click", () => {

video.muted = false;

video.play();

button.innerHTML = "🔊 SOUND ON";

button.style.opacity = "0.4";

setTimeout(()=>{
button.style.display="none";
},1500);

});

</script>

</body>

</html>
